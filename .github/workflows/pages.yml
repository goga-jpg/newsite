name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/build-5dm-website-Ag7Ww
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- Root site (original) ---
      - run: npm ci
        working-directory: .

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm run build
        env:
          VITE_BASE: /newsite/
        working-directory: .

      # --- Studio site (new design) ---
      - name: Install studio deps
        run: npm ci
        working-directory: ./studio

      - name: Build studio
        run: npm run build
        env:
          VITE_BASE: /newsite/studio/
        working-directory: ./studio

      - name: Assemble final dist
        run: |
          mkdir -p dist/studio
          cp -r studio/dist/* dist/studio/
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
